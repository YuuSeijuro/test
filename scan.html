<!DOCTYPE html>
<html>
<head>
    <title>Simple QR Scanner Test</title>

    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        #reader {
            width: 300px;
            margin: auto;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>
<body>

<h2>QR Scanner Test</h2>

<div id="reader"></div>

<div id="result">Scan a QR code...</div>

<script>
function onScanSuccess(decodedText) {
    // Display scanned result
    document.getElementById("result").innerHTML =
        "Scanned: " + decodedText;
}

// Start scanner
const scanner = new Html5QrcodeScanner(
    "reader",
    {
        fps: 10,
        qrbox: 250
    }
);

scanner.render(onScanSuccess);
</script>

</body>
</html>
